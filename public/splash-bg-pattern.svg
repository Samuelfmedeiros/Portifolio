<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.08"/>
    </pattern>
    <!-- Small grid -->
    <pattern id="grid-small" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#6366f1" stroke-width="0.2" opacity="0.05"/>
    </pattern>
    <!-- Hexagon tile -->
    <pattern id="hexagons" width="60" height="104" patternUnits="userSpaceOnUse">
      <path d="M30 0 L60 17 L60 52 L30 69 L0 52 L0 17 Z" fill="none" stroke="#22d3ee" stroke-width="0.3" opacity="0.04"/>
    </pattern>
    <!-- Nebula gradients -->
    <radialGradient id="nebula1" cx="30%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="70%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="#06b6d4" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="50%" cy="80%" r="30%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Star glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Base -->
  <rect width="1440" height="900" fill="#020617"/>
  <!-- Nebulae -->
  <rect width="1440" height="900" fill="url(#nebula1)"/>
  <rect width="1440" height="900" fill="url(#nebula2)"/>
  <rect width="1440" height="900" fill="url(#nebula3)"/>
  <!-- Grid overlays -->
  <rect width="1440" height="900" fill="url(#grid)"/>
  <rect width="1440" height="900" fill="url(#grid-small)"/>
  <rect width="1440" height="900" fill="url(#hexagons)"/>
  <!-- Stars - scattered across depths -->
  <g filter="url(#glow)">
    <!-- Distant small stars (cyan) -->
    <circle cx="120" cy="80" r="1.2" fill="#22d3ee" opacity="0.4"/>
    <circle cx="340" cy="150" r="0.8" fill="#22d3ee" opacity="0.3"/>
    <circle cx="560" cy="60" r="1.0" fill="#67e8f9" opacity="0.35"/>
    <circle cx="780" cy="200" r="0.7" fill="#22d3ee" opacity="0.25"/>
    <circle cx="950" cy="90" r="1.3" fill="#22d3ee" opacity="0.4"/>
    <circle cx="1100" cy="180" r="0.9" fill="#67e8f9" opacity="0.3"/>
    <circle cx="1320" cy="120" r="0.6" fill="#22d3ee" opacity="0.2"/>
    <circle cx="200" cy="350" r="1.1" fill="#22d3ee" opacity="0.35"/>
    <circle cx="500" cy="420" r="0.8" fill="#67e8f9" opacity="0.25"/>
    <circle cx="700" cy="380" r="1.4" fill="#22d3ee" opacity="0.4"/>
    <circle cx="900" cy="450" r="0.7" fill="#22d3ee" opacity="0.3"/>
    <circle cx="1200" cy="350" r="1.0" fill="#67e8f9" opacity="0.35"/>
    <circle cx="1380" cy="400" r="0.9" fill="#22d3ee" opacity="0.3"/>
    <circle cx="80" cy="550" r="0.6" fill="#22d3ee" opacity="0.2"/>
    <circle cx="280" cy="680" r="1.2" fill="#67e8f9" opacity="0.35"/>
    <circle cx="480" cy="750" r="0.8" fill="#22d3ee" opacity="0.3"/>
    <circle cx="650" cy="650" r="1.0" fill="#22d3ee" opacity="0.35"/>
    <circle cx="850" cy="700" r="0.7" fill="#67e8f9" opacity="0.25"/>
    <circle cx="1050" cy="600" r="1.1" fill="#22d3ee" opacity="0.3"/>
    <circle cx="1250" cy="780" r="0.9" fill="#22d3ee" opacity="0.3"/>
    <circle cx="1400" cy="680" r="0.6" fill="#67e8f9" opacity="0.2"/>
    <!-- Mid stars (indigo/white) -->
    <circle cx="60" cy="200" r="1.8" fill="#a78bfa" opacity="0.45"/>
    <circle cx="450" cy="280" r="2.0" fill="#e2e8f0" opacity="0.4"/>
    <circle cx="820" cy="100" r="1.6" fill="#a78bfa" opacity="0.5"/>
    <circle cx="1040" cy="300" r="1.9" fill="#e2e8f0" opacity="0.35"/>
    <circle cx="360" cy="530" r="2.1" fill="#a78bfa" opacity="0.4"/>
    <circle cx="740" cy="500" r="1.7" fill="#e2e8f0" opacity="0.45"/>
    <circle cx="1170" cy="520" r="1.5" fill="#a78bfa" opacity="0.35"/>
    <circle cx="150" cy="720" r="1.8" fill="#e2e8f0" opacity="0.4"/>
    <circle cx="930" cy="820" r="2.0" fill="#a78bfa" opacity="0.45"/>
    <!-- Bright stars (with cross glow) -->
    <g>
      <line x1="260" y1="218" x2="260" y2="222" stroke="#22d3ee" stroke-width="0.5" opacity="0.6"/>
      <line x1="258" y1="220" x2="262" y2="220" stroke="#22d3ee" stroke-width="0.5" opacity="0.6"/>
      <circle cx="260" cy="220" r="2.5" fill="#22d3ee" opacity="0.6"/>
    </g>
    <g>
      <line x1="660" y1="168" x2="660" y2="174" stroke="#a78bfa" stroke-width="0.5" opacity="0.5"/>
      <line x1="657" y1="171" x2="663" y2="171" stroke="#a78bfa" stroke-width="0.5" opacity="0.5"/>
      <circle cx="660" cy="171" r="3.0" fill="#a78bfa" opacity="0.5"/>
    </g>
    <g>
      <line x1="1350" y1="280" x2="1350" y2="285" stroke="#22d3ee" stroke-width="0.5" opacity="0.5"/>
      <line x1="1347" y1="282" x2="1353" y2="282" stroke="#22d3ee" stroke-width="0.5" opacity="0.5"/>
      <circle cx="1350" cy="282" r="2.8" fill="#22d3ee" opacity="0.55"/>
    </g>
  </g>
  <!-- Subtle horizontal line accents -->
  <line x1="0" y1="445" x2="1440" y2="445" stroke="#22d3ee" stroke-width="0.3" opacity="0.06"/>
  <line x1="0" y1="450" x2="1440" y2="450" stroke="#6366f1" stroke-width="0.2" opacity="0.04"/>
  <line x1="0" y1="455" x2="1440" y2="455" stroke="#22d3ee" stroke-width="0.3" opacity="0.06"/>
</svg>
