<svg width="150" height="100" viewBox="0 0 150 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shellGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor="#1a1a2e" />
      <stop offset="40%" stopColor="#2d2d4a" />
      <stop offset="100%" stopColor="#0f0f1a" />
    </linearGradient>
    <linearGradient id="shellTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stopColor="#22d3ee" stopOpacity="0.4" />
      <stop offset="50%" stopColor="#6366f1" stopOpacity="0.2" />
      <stop offset="100%" stopColor="#22d3ee" stopOpacity="0.05" />
    </linearGradient>
    <linearGradient id="bandShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor="#22d3ee" stopOpacity="0.5" />
      <stop offset="50%" stopColor="#6366f1" stopOpacity="0.1" />
      <stop offset="100%" stopColor="#22d3ee" stopOpacity="0.3" />
    </linearGradient>
  </defs>

  <!-- Shadow under tatu -->
  <ellipse cx="80" cy="86" rx="35" ry="6" fill="rgba(0,0,0,0.3)" filter="blur(4px)" />

  <!-- TAIL -->
  <path d="M 117,52 C 130,48 140,32 143,22 C 145,16 147,14 145,18" stroke="#6366f1" strokeWidth="3.5" fill="none" strokeLinecap="round" />

  <!-- BACK LEG -->
  <path d="M 100,72 L 100,88 Q 100,92 104,90" stroke="#2d2d4a" strokeWidth="5" strokeLinecap="round" fill="none" />

  <!-- BODY SHELL -->
  <path d="M 55,48 C 55,20 72,10 98,12 C 118,14 130,26 130,48 C 130,64 120,74 100,76 C 72,78 55,68 55,48 Z" fill="url(#shellGrad)" stroke="#22d3ee" strokeWidth="0.8" />

  <!-- Shell top highlight -->
  <path d="M 60,48 C 60,24 74,14 98,16 C 114,17 126,27 126,48" stroke="url(#shellTop)" strokeWidth="2" fill="none" opacity="0.3" />

  <!-- SHELL BAND SEGMENTS -->
  <line x1="68" y1="14" x2="68" y2="74" stroke="url(#bandShine)" strokeWidth="1.2" fill="none" />
  <line x1="84" y1="11" x2="84" y2="76" stroke="url(#bandShine)" strokeWidth="1.2" fill="none" />
  <line x1="100" y1="11" x2="100" y2="76" stroke="url(#bandShine)" strokeWidth="1.2" fill="none" />
  <line x1="116" y1="15" x2="116" y2="72" stroke="url(#bandShine)" strokeWidth="1.2" fill="none" />

  <!-- Shell band accent dots -->
  <circle cx="72" cy="22" r="1.2" fill="#22d3ee" opacity="0.4" />
  <circle cx="88" cy="68" r="1.2" fill="#22d3ee" opacity="0.5" />
  <circle cx="104" cy="22" r="1.2" fill="#22d3ee" opacity="0.6" />
  <circle cx="120" cy="68" r="1.2" fill="#22d3ee" opacity="0.7" />

  <!-- HEAD -->
  <path d="M 55,48 C 50,30 38,24 28,26 C 18,28 10,34 8,42 C 6,50 14,54 24,54 C 34,54 45,54 55,48 Z" fill="#1a1a2e" stroke="#6366f1" strokeWidth="0.8" />

  <!-- SNOUT -->
  <path d="M 8,42 C 3,43 0,43 0,44" stroke="#22d3ee" strokeWidth="2" strokeLinecap="round" />
  <circle cx="1" cy="44" r="1" fill="#22d3ee" opacity="0.6" filter="blur(1px)" />

  <!-- EYE -->
  <circle cx="28" cy="33" r="2.5" fill="#22d3ee" />
  <circle cx="28" cy="33" r="1" fill="white" />

  <!-- EAR -->
  <path d="M 35,25 C 33,18 35,14 40,16 C 44,18 42,24 38,26" fill="#2d2d4a" stroke="#6366f1" strokeWidth="0.6" />

  <!-- FRONT LEG -->
  <path d="M 70,72 L 70,88 Q 70,92 74,90" stroke="#2d2d4a" strokeWidth="5" strokeLinecap="round" fill="none" />
</svg>
