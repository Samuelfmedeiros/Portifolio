version: 2
updates:
  # npm/pnpm dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    reviewers:
      - Samuelfmedeiros
    ignore:
      - dependency-name: "next"
        versions: [">=17.0.0"]
      - dependency-name: "react"
        versions: [">=20.0.0"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - ci
      - security
