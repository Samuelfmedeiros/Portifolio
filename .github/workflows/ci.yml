name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test:
    name: Build + Lint + Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint || true

      - name: Type check
        run: pnpm exec tsc --noEmit --skipLibCheck || true

      - name: Unit tests
        run: pnpm test -- --run || true

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: pnpm build

      - name: Build summary
        run: |
          echo "✅ Build complete!"
          echo "📦 Build size: $(du -sh .next | cut -f1)"

  e2e:
    name: Playwright E2E
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Build application
        run: pnpm build
      - name: Start production server
        id: prod-server
        run: |
          pnpm start > /dev/null 2>&1 &
          echo $! > /tmp/prod.pid
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Server ready"
              break
            fi
            sleep 1
          done
      - name: Run Playwright tests
        run: npx playwright test
      - name: Stop production server
        if: always()
        run: |
          kill $(cat /tmp/prod.pid) || true
  deploy:
    name: Deploy to Vercel
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          pnpm exec vercel deploy --prod --yes \
            --token "$VERCEL_TOKEN" \
            --env NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --env NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}