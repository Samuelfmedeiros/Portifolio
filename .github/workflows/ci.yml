name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test:
    name: Build + Lint + Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint || true

      - name: Type check
        run: pnpm exec tsc --noEmit --skipLibCheck || true

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: pnpm build

      - name: Build summary
        run: |
          echo "✅ Build complete!"
          echo "📦 Output dir: out/"
          du -sh out/ 2>/dev/null || echo "No out/ dir"

  e2e:
    name: Playwright E2E
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install pnpm
        run: npm install -g pnpm@9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build application
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: pnpm build
      - name: Start static server
        id: prod-server
        run: |
          npx serve out -l 3000 > /dev/null 2>&1 &
          echo $! > /tmp/prod.pid
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Server ready on port 3000"
              break
            fi
            sleep 1
          done
          # Verify server is responding
          curl -sI http://localhost:3000 | head -5
      - name: Run Playwright tests
        run: npx playwright test --project=chromium --reporter=list
      - name: Stop server
        if: always()
        run: kill $(cat /tmp/prod.pid) 2>/dev/null || true
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
