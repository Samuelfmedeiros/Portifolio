name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm v9
        run: |
          npm install -g pnpm@9.12.3
          pnpm --version

      - name: Debug env
        run: |
          echo "=== ENV ==="
          node --version
          npm --version
          pnpm --version
          echo "=== PKG ==="
          cat package.json | head -5
          echo "=== LOCKFILE HEADER ==="
          head -5 pnpm-lock.yaml

      - name: Install and build
        run: |
          echo "=== INSTALL START ==="
          pnpm install --no-frozen-lockfile 2>&1 || true
          echo "=== INSTALL DONE ==="
          echo "=== BUILD START ==="
          pnpm build 2>&1 || true
          echo "=== BUILD DONE ==="

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4