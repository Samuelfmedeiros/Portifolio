name: Deploy Mission Control

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint check
        continue-on-error: true
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test:run

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}\n' \
            "${{ secrets.VERCEL_ORG_ID }}" \
            "${{ secrets.VERCEL_PROJECT_ID }}" \
            > .vercel/project.json

      - name: Build and Deploy to Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Health Check
        run: |
          sleep 10
          for i in $(seq 1 3); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" https://mission-control.pages.dev 2>/dev/null || \
                   curl -s -o /dev/null -w "%{http_code}" https://mission-control.vercel.app 2>/dev/null)
            [ "$CODE" = "200" ] && echo "✅ Online (HTTP $CODE)" && exit 0
            echo "Tentativa $i: $CODE"
            sleep 5
          done
          echo "❌ Site offline" && exit 1
