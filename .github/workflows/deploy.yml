name: Deploy Mission Control

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint check
        continue-on-error: true
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test:run

      - name: Build & Deploy to Vercel
        run: |
          echo "=== Token check ==="
          echo "Length: ${#VERCEL_TOKEN}"
          curl -s -w "\nHTTP: %{http_code}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            "https://api.vercel.com/v9/user" | tail -1
          echo "=== Deploy ==="
          npx vercel@latest --prod --yes 2>&1
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Health Check
        run: |
          sleep 10
          for i in $(seq 1 3); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" https://mission-control.pages.dev 2>/dev/null || \
                   curl -s -o /dev/null -w "%{http_code}" https://mission-control.vercel.app 2>/dev/null)
            [ "$CODE" = "200" ] && echo "✅ Online (HTTP $CODE)" && exit 0
            echo "Tentativa $i: $CODE"
            sleep 5
          done
          echo "❌ Site offline" && exit 1
