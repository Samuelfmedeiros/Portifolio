name: Portifolio CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
      statuses: write

    steps:
    - uses: actions/checkout@v7

    - name: Validate version
      run: |
        VERSION=$(grep '"version"' package.json | sed 's/.*"version": "//;s/".*//')
        if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "❌ Versão inválida: $VERSION (deve ser semver major.minor.patch)"
          exit 1
        fi
        echo "✅ Versão validada: v$VERSION"

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Enable pnpm via corepack
      run: |
        corepack enable
        corepack prepare pnpm@9 --activate
        mkdir -p /tmp/pnpm-store
        pnpm config set store-dir /tmp/pnpm-store --global
        echo "PNPM_HOME=/tmp/pnpm-home" >> "$GITHUB_ENV"

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run lint
      continue-on-error: true
      run: pnpm lint

    - name: Run tests
      continue-on-error: true
      run: pnpm vitest run

    - name: Build project
      run: pnpm build

    # ── Deploy & Rollback ──────────────────────────────────────
    - name: Get current production deployment
      if: github.ref_name == 'master' && github.event_name != 'pull_request'
      id: prev_deploy
      run: |
        PREV=$(npx vercel@latest list --environment production --limit 1 --format json \
          --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null | \
          python3 -c "
        import json, sys
        try:
            d = json.load(sys.stdin)
            deploys = d if isinstance(d, list) else d.get('deployments', [])
            for dep in deploys:
                if dep.get('state') == 'READY':
                    uid = dep.get('uid', '') or dep.get('name', '')
                    url = dep.get('url', '')
                    if uid:
                        print(f'{uid}|{url}')
                    break
        except:
            pass
        " 2>/dev/null || echo "")

        if [ -z "$PREV" ]; then
          echo "⚠️ Nenhum deployment anterior encontrado — rollback desabilitado"
          echo "has_previous=false" >> "$GITHUB_OUTPUT"
        else
          DEPLOY_ID=$(echo "$PREV" | cut -d'|' -f1)
          DEPLOY_URL=$(echo "$PREV" | cut -d'|' -f2)
          echo "✅ Deployment anterior: $DEPLOY_ID ($DEPLOY_URL)"
          echo "has_previous=true" >> "$GITHUB_OUTPUT"
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
        fi

    - name: Deploy to Vercel
      if: github.ref_name == 'master' && github.event_name != 'pull_request'
      id: deploy
      run: npx vercel@latest --prod --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1

    - name: Health Check
      if: github.ref_name == 'master' && github.event_name != 'pull_request'
      id: health
      run: |
        echo "⏳ Aguardando propagação (15s)..."
        sleep 15
        for i in $(seq 1 5); do
          CODE=$(curl -s -o /dev/null -w '%{http_code}' https://samuelmedeiros.vercel.app 2>/dev/null)
          echo "Tentativa $i/5: HTTP $CODE"
          if [ "$CODE" = "200" ]; then
            echo "✅ Site online (HTTP $CODE)"
            echo "healthy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sleep 5
        done
        echo "❌ Site offline após deploy"
        echo "healthy=false" >> "$GITHUB_OUTPUT"
        exit 1

    - name: Rollback on health check failure
      if: github.ref_name == 'master'
        && github.event_name != 'pull_request'
        && steps.health.outputs.healthy == 'false'
        && steps.prev_deploy.outputs.has_previous == 'true'
      id: rollback
      run: |
        echo "🔄 Rollback para ${{ steps.prev_deploy.outputs.deploy_id }}..."
        npx vercel@latest rollback ${{ steps.prev_deploy.outputs.deploy_id }} \
          --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1

        echo "⏳ Aguardando rollback (15s)..."
        sleep 15
        for i in $(seq 1 3); do
          CODE=$(curl -s -o /dev/null -w '%{http_code}' https://samuelmedeiros.vercel.app 2>/dev/null)
          echo "Verificação $i/3: HTTP $CODE"
          if [ "$CODE" = "200" ]; then
            echo "✅ Rollback OK — site online (HTTP $CODE)"
            echo "rollback_ok=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sleep 5
        done
        echo "⚠️ Rollback executado, mas site retornou HTTP $CODE — verificar manualmente"
        echo "rollback_ok=degraded" >> "$GITHUB_OUTPUT"

    # ── Notificações ──────────────────────────────────────────
    - name: Notify Telegram Success
      if: github.ref_name == 'master' && github.event_name != 'pull_request' && success()
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=✅ *Portifólio CI*%0A%0A📦 *Status:* Sucesso%0A🔗 *URL:* https://samuelmedeiros.vercel.app%0A📝 *Commit:* \`$(git rev-parse --short HEAD)\`" \
          -d "parse_mode=Markdown"

    - name: Notify Telegram Failure
      if: github.ref_name == 'master' && github.event_name != 'pull_request' && failure()
      run: |
        ROLLBACK_MSG=""
        if [ "${{ steps.rollback.outputs.rollback_ok }}" = "true" ]; then
          ROLLBACK_MSG="%0A🔄 *Rollback:* ✅ Rollback automático para \`${{ steps.prev_deploy.outputs.deploy_id }}\""
        elif [ "${{ steps.rollback.outputs.rollback_ok }}" = "degraded" ]; then
          ROLLBACK_MSG="%0A🔄 *Rollback:* ⚠️ Executado mas requer verificação manual"
        fi
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=❌ *Portifólio CI Falhou*%0A%0A📝 *Commit:* \`$(git rev-parse --short HEAD)\`%0A🔍 *Log:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}${ROLLBACK_MSG}" \
          -d "parse_mode=Markdown"
