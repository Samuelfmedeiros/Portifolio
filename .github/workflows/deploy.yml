name: Deploy Portifolio Samuel

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version
        run: |
          VERSION=$(grep '"version"' package.json | sed 's/.*"version": "//;s/".*//')
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ Versão inválida: $VERSION (deve ser semver major.minor.patch)"
            exit 1
          fi
          echo "✅ Versão validada: v$VERSION"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint check
        continue-on-error: true
        run: pnpm lint

      - name: Run unit tests
        continue-on-error: true
        run: pnpm test:run

      - name: Build project
        run: pnpm build

      - name: Deploy to Vercel
        run: npx vercel@latest --prod --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1

      - name: Health Check
        run: |
          sleep 15
          for i in $(seq 1 3); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" https://samuelmedeiros.vercel.app 2>/dev/null)
            [ "$CODE" = "200" ] && echo "✅ Online (HTTP $CODE)" && exit 0
            echo "Tentativa $i: $CODE"
            sleep 5
          done
          echo "❌ Site offline" && exit 1
